# Optional: one-click backend deploy on Render.
# In Render, choose "New + → Blueprint" and point it at this repo, OR create a
# Web Service manually with the settings in README §"Deploy the backend".
services:
  - type: web
    name: safal-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Set these two in the Render dashboard (don't commit secrets):
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
